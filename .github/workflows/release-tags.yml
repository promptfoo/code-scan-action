name: Move release tags

on:
  push:
    branches:
      - main
    paths:
      - .release-source.json

permissions:
  contents: write

concurrency:
  group: release-tags-main
  cancel-in-progress: false

jobs:
  move-release-tags:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Skip stale workflow executions
        id: freshness
        run: |
          set -euo pipefail

          git fetch origin main
          current_main_sha="$(git rev-parse origin/main)"

          if [[ "$GITHUB_SHA" != "$current_main_sha" ]]; then
            echo "release_commit=false" >> "$GITHUB_OUTPUT"
            echo "Skipping stale run for $GITHUB_SHA; origin/main is $current_main_sha"
            exit 0
          fi

          echo "release_commit=true" >> "$GITHUB_OUTPUT"

      - name: Skip non-release commits
        id: release-metadata
        if: ${{ steps.freshness.outputs.release_commit == 'true' }}
        run: |
          set -euo pipefail

          if [[ ! -f .release-source.json ]]; then
            echo "release_commit=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          version="$(jq -r '.version' .release-source.json)"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release version in .release-source.json: $version"
            exit 1
          fi

          echo "release_commit=true" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "major=${version%%.*}" >> "$GITHUB_OUTPUT"
          echo "minor=${version%.*}" >> "$GITHUB_OUTPUT"

      - name: Update floating and exact version tags
        if: ${{ steps.release-metadata.outputs.release_commit == 'true' }}
        env:
          VERSION: ${{ steps.release-metadata.outputs.version }}
          MAJOR: ${{ steps.release-metadata.outputs.major }}
          MINOR: ${{ steps.release-metadata.outputs.minor }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -fa "v${VERSION}" -m "Release v${VERSION}"
          git tag -fa "v${MINOR}" -m "Release v${MINOR}"
          git tag -fa "v${MAJOR}" -m "Release v${MAJOR}"

          git fetch origin main
          current_main_sha="$(git rev-parse origin/main)"
          if [[ "$GITHUB_SHA" != "$current_main_sha" ]]; then
            echo "Skipping stale tag update for $GITHUB_SHA; origin/main is $current_main_sha"
            exit 0
          fi

          git push --force origin "refs/tags/v${VERSION}" "refs/tags/v${MINOR}" "refs/tags/v${MAJOR}"

      - name: Create or update GitHub release
        if: ${{ steps.release-metadata.outputs.release_commit == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.release-metadata.outputs.version }}
        run: |
          set -euo pipefail

          notes_file="$RUNNER_TEMP/release-notes.md"
          awk -v version="$VERSION" '
            $0 ~ "^## \\[" version "\\]" {
              in_section=1
              next
            }
            in_section && /^## \[/ {
              exit
            }
            in_section {
              print
            }
          ' CHANGELOG.md > "$notes_file"

          if [[ ! -s "$notes_file" ]]; then
            printf 'Release v%s\n' "$VERSION" > "$notes_file"
          fi

          git fetch origin main
          current_main_sha="$(git rev-parse origin/main)"
          if [[ "$GITHUB_SHA" != "$current_main_sha" ]]; then
            echo "Skipping stale release update for $GITHUB_SHA; origin/main is $current_main_sha"
            exit 0
          fi

          if gh release view "v${VERSION}" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            gh release edit "v${VERSION}" \
              --repo "$GITHUB_REPOSITORY" \
              --title "v${VERSION}" \
              --notes-file "$notes_file" \
              --target "$GITHUB_SHA" \
              --verify-tag
          else
            gh release create "v${VERSION}" \
              --repo "$GITHUB_REPOSITORY" \
              --title "v${VERSION}" \
              --notes-file "$notes_file" \
              --target "$GITHUB_SHA" \
              --verify-tag
          fi
